<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertel</title>
    <link rel="stylesheet" href="styles/style.css">
    <script src="scripts/script.js" defer></script>
</head>

<body>
    <header>
        <h1>Chat met Nienke</h1>
        <nav>
            <ul>
                <li><a href="bellen">Bel Nienke</a></li>
                <li>Zoeken</li>
                <li>Status</li>
            </ul>
        </nav>
    </header>

    <main>
        <article>
            <p>Hoe is het?</p>
            <time datetime="30-03-26 12:00">30/03/26 12:00</time>
        </article>

        <article>
            <p>Reageer nouuu</p>
            <time datetime="30-03-26 13:00">30/03/26 13:00</time>
        </article>
    </main>
    
    <footer>
        <form action="send">
            <button class="record" type="button">Neem spraakopname op</button>
            <button class="stop-recording" type="button">Stop spraakopname</button>

            <article class="sound-clips" aria-label="Opgenomen spraakbericht">
                <!-- opgenomen spraakbericht -->
            </article>
        </form>
    </footer>
</body>

</html>

<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat met Nienke</title>
    <link rel="stylesheet" href="styles/style.css">
    <script src="scripts/script.js" defer></script>
</head>

<body>
    <header>
        <h1>Chat met Nienke</h1>
        <p>Om meer informatie te weten over een bericht, klik op 'i' tijdens het focussen op eeen bericht.</p>
        <nav>
            <ul>
                <li><a href="bellen">Bel Nienke</a></li>
                <li>
                    <label for="search-chat">Zoek in chats</label>
                    <input type="search" id="search-chat"/>
                    <button type="button">Zoeken</button>
                </li>
                <li>Status: Online</li>
            </ul>
        </nav>
    </header>

    <main>
        <article tabindex="0"> <!-- ChatGPT prompt: hoe zorg ik ervoor dat je alsnog een focus state hebt als je met een screenreader door de articles heen gaat-->
            <p>Reageer nou!</p>

            <button aria-expanded="false" hidden aria-controls="extra-info">
                <!-- https://developer.mozilla.org/en-US/docs/Web/Accessibility/ARIA/Reference/Attributes/aria-controls -->
                <!-- https://developer.mozilla.org/en-US/docs/Web/Accessibility/ARIA/Reference/Attributes/aria-expanded -->
                Meer info
            </button>

            <ul class="extra-info" hidden aria-live="polite">
                <li>Dit bericht is geplaatst op 30 maart 2026 om 12 uur.</li>
            </ul>
        </article>

        <article tabindex="0">
            <p>Hoe is het?</p>

            <button aria-expanded="false" hidden aria-controls="extra-info">
                Meer info
            </button>

            <ul class="extra-info" hidden aria-live="polite">
                <li>Dit bericht is geplaatst op 30 maart 2026 om 13 uur.</li>
            </ul>
        </article>
    </main>

    <footer>
        <form action="send">
            <button class="record" type="button">Neem spraakopname op</button>

            <ul class="sound-clips" aria-label="Hier komen je opgenomen spraakberichten te staan voor het versturen">
                <!-- opgenomen spraakberichten -->
            </ul>
            <button class="delete-all" type="button">Verwijder alle spraakopnames</button>
        </form>
    </footer>
</body>

</html>
